<div class="card" style="margin-bottom:1.25rem;">
  <div class="card-body" style="padding:.85rem 1.25rem;">
    <form method="get" class="filter-bar" style="flex-wrap:wrap;">
      <div class="form-group" style="margin-bottom:0;min-width:160px;">
        <label class="form-label" style="margin-bottom:.25rem;">From</label>
        <input type="date" name="date_from" class="form-control" value="{{ date_from|date:'Y-m-d' }}">
      </div>
      <div class="form-group" style="margin-bottom:0;min-width:160px;">
        <label class="form-label" style="margin-bottom:.25rem;">To</label>
        <input type="date" name="date_to" class="form-control" value="{{ date_to|date:'Y-m-d' }}">
      </div>
      {% block extra_filters %}{% endblock %}
      <div style="display:flex;align-items:flex-end;gap:.65rem;flex-wrap:wrap;">
        <button type="submit" class="btn btn-primary">Apply</button>
        <a href="?date_from={{ date_from|date:'Y-m-d' }}&date_to={{ date_to|date:'Y-m-d' }}&format=excel" class="btn btn-outline">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Excel
        </a>
        <a href="?date_from={{ date_from|date:'Y-m-d' }}&date_to={{ date_to|date:'Y-m-d' }}&format=pdf" class="btn btn-outline">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          PDF
        </a>
      </div>
    </form>
  </div>
</div>
